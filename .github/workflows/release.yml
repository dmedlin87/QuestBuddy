name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ["5.1", "5.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get install -y lua${{ matrix.lua-version }}

      - name: Run checks
        shell: pwsh
        run: ./check.ps1

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_name=QuestBuddy-v$version.zip" >> "$GITHUB_OUTPUT"

      - name: Build installer-ready release assets
        shell: pwsh
        run: |
          ./scripts/Build-AscensionRelease.ps1 -Version "${{ steps.version.outputs.version }}" -OutputDir "release-assets"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/${{ steps.version.outputs.zip_name }}
            release-assets/addon-manifest.json
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

