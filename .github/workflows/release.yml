name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ["5.1", "5.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get install -y lua${{ matrix.lua-version }}

      - name: Run checks
        shell: pwsh
        run: ./check.ps1

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release version
        id: release
        shell: pwsh
        env:
          GITHUB_REF_NAME_SAFE: ${{ github.ref_name }}
        run: |
          $release = Get-Content -LiteralPath "./addon-release.json" -Raw | ConvertFrom-Json
          $version = [string]$release.version
          $zipName = "{0}-v{1}.zip" -f @($release.folders)[0], $version
          if ("v$version" -ne $env:GITHUB_REF_NAME_SAFE) {
            throw "Tag '$($env:GITHUB_REF_NAME_SAFE)' does not match addon-release.json version 'v$version'."
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Build installer-ready release assets
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          ./scripts/Build-AscensionRelease.ps1 -ExpectedVersion $env:EXPECTED_VERSION -OutputDir "release-assets"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME_SAFE: ${{ github.ref_name }}
          ZIP_NAME: ${{ steps.release.outputs.zip_name }}
        run: |
          if ($env:GITHUB_REF_NAME_SAFE.Contains("-beta") -or $env:GITHUB_REF_NAME_SAFE.Contains("-alpha")) {
            gh release create $env:GITHUB_REF_NAME_SAFE "release-assets/$($env:ZIP_NAME)" "release-assets/addon-manifest.json" --verify-tag --prerelease
          } else {
            gh release create $env:GITHUB_REF_NAME_SAFE "release-assets/$($env:ZIP_NAME)" "release-assets/addon-manifest.json" --verify-tag
          }

